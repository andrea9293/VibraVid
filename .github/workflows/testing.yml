name: Run Tests

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

on:
  push:
    branches: [ main, master, develop, dev ]
  pull_request:
    branches: [ main, master, develop, dev ]
  workflow_dispatch:
jobs:
  ruff-lint:
    name: Lint with Ruff
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.13'
    - name: Install Ruff
      run: |
        python -m pip install ruff
    - name: Run Ruff check
      run: |
        ruff check .